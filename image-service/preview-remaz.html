<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Story Preview - Remaz İnşaat (X-Post)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px}
.story{width:1080px;height:1920px;background:#1c1c1e;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:scale(0.45);transform-origin:top center;flex-shrink:0}
.card{width:900px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,0.35)}
.card-header{display:flex;align-items:center;padding:32px 36px 0 36px;gap:20px}
.avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#1a472a,#2d6a4f);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:38px;font-weight:800}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-info{flex:1;min-width:0}
.user-name{font-size:34px;font-weight:800;color:#0f1419;line-height:1.1}
.user-handle{font-size:26px;font-weight:400;color:#71767b;margin-top:2px}
.tweet-text{padding:28px 36px 20px 36px;font-size:40px;font-weight:700;color:#0f1419;line-height:1.45;word-wrap:break-word}
.tweet-text .hashtag{color:#1d9bf0}
.photo-container{margin:0 36px 16px 36px;border-radius:20px;overflow:hidden;height:420px;background:linear-gradient(135deg,#ddd,#bbb);display:flex;align-items:center;justify-content:center;color:#999;font-size:28px}
.photo-container img{width:100%;height:100%;object-fit:cover;display:block}
.tweet-date{padding:0 36px 18px 36px;font-size:24px;color:#71767b;border-top:1px solid #eff3f4;padding-top:16px;margin-top:8px}
.engagement{display:flex;align-items:center;padding:16px 36px 28px 36px;gap:72px;border-top:1px solid #eff3f4;margin-top:4px}
.eng-item{display:flex;align-items:center;gap:10px;font-size:24px;color:#536471}
.eng-item svg{width:36px;height:36px}
.eng-item span{font-weight:500}
.brand-watermark{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);text-align:center;opacity:0.35}
.brand-watermark .brand-name{font-size:28px;font-weight:700;color:#fff;letter-spacing:2px}
.brand-watermark .brand-web{font-size:20px;font-weight:400;color:#fff;margin-top:4px}
</style>
</head>
<body>

<div class="story">
  <div class="card">

    <div class="card-header">
      <div class="avatar">RI</div>
      <div class="user-info">
        <div class="user-name">Remaz İnşaat</div>
        <div class="user-handle">@remazinsaat</div>
    </div>

    <div class="tweet-text">
      Modern yaşam alanları, güvenilir yatırım.<br><br>
      Yeni projemiz satışta! Detaylar için web sitemizi ziyaret edin.<br>
      <span class="hashtag">#remazinsaat</span> <span class="hashtag">#konut</span> <span class="hashtag">#yatirim</span>
    </div>

    <div class="photo-container">📷 Opsiyonel Fotoğraf Alanı</div>

    <div class="tweet-date">14:20 · 6 Haz 2026</div>

    <div class="engagement">
      <div class="eng-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>18</span>
      </div>
      <div class="eng-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span>9</span>
      </div>
      <div class="eng-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>142</span>
      </div>
      <div class="eng-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </div>
    </div>

  </div>

  <div class="brand-watermark">
    <div class="brand-name">REMAZ İNŞAAT</div>
    <div class="brand-web">remazinsaat.web.app</div>
  </div>
</div>

</body>
</html>
